<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bibhas Das | Resume</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="resume">
  <h1 id="name"></h1>

  <p class="contact" id="contact"></p>

  <div class="section">
    <div class="section-title">Career Objective</div>
    <p id="objective"></p>
  </div>

  <div class="section">
    <div class="section-title">Education and Qualification</div>
    <table id="education"></table>
  </div>

  <div class="section">
    <div class="section-title">Technical Skills</div>
    <div class="two-col" id="skills"></div>
  </div>

  <div class="section">
    <div class="section-title">Projects</div>
    <div id="projects"></div>
  </div>

  <div class="section">
    <div class="section-title">Soft Skills</div>
    <div class="two-col" id="softSkills"></div>
  </div>

  <div class="section">
    <div class="section-title">Known Languages</div>
    <div class="inline-list" id="languages"></div>
  </div>

  <div class="section">
    <div class="section-title">Hobbies/Interest</div>
    <div class="inline-list" id="hobbies"></div>
  </div>

  <div class="section">
    <div class="section-title">Declaration</div>
    <p id="declaration"></p>
    <p class="date" id="datePlace"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
